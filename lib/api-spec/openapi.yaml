openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bookshelf - Wattpad-style book sharing platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: books
    description: Book upload, browse, and management
  - name: library
    description: Personal library management
  - name: comments
    description: Book comments
  - name: messages
    description: Direct messages
  - name: storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get or create current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get a public user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Books ─────────────────────────────────────────────────────────
  /books:
    get:
      operationId: listPublicBooks
      tags: [books]
      summary: List public books with optional search/filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: genre
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of public books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

    post:
      operationId: createBook
      tags: [books]
      summary: Upload a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /books/trending:
    get:
      operationId: getTrendingBooks
      tags: [books]
      summary: Get trending books (most downloaded + commented recently)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Trending books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

  /books/{bookId}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book by ID
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    patch:
      operationId: updateBook
      tags: [books]
      summary: Update book metadata
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookBody"
      responses:
        "200":
          description: Updated book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /books/{bookId}/download:
    post:
      operationId: downloadBook
      tags: [books]
      summary: Record a download and get the file URL
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/{userId}/books:
    get:
      operationId: getUserBooks
      tags: [books]
      summary: Get books uploaded by a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: includePrivate
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: User's books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

  # ── Library ───────────────────────────────────────────────────────
  /library:
    get:
      operationId: getMyLibrary
      tags: [library]
      summary: Get current user's saved library
      responses:
        "200":
          description: Library entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /library/{bookId}:
    post:
      operationId: addToLibrary
      tags: [library]
      summary: Add a book to personal library
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Added to library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryEntry"
        "400":
          description: Already in library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    delete:
      operationId: removeFromLibrary
      tags: [library]
      summary: Remove a book from personal library
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not in library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Comments ──────────────────────────────────────────────────────
  /books/{bookId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on a book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"

    post:
      operationId: createComment
      tags: [comments]
      summary: Post a comment on a book
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /books/{bookId}/comments/{commentId}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment (owner or book author only)
      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Messages ──────────────────────────────────────────────────────
  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List all conversations for current user
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /messages/{otherUserId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages in a conversation with another user
      parameters:
        - name: otherUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a direct message to another user
      parameters:
        - name: otherUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Storage ───────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Users ──────────────────────────────────────
    UserProfile:
      type: object
      required: [id, clerkId, username, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bookCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    UpdateUserBody:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
        avatarObjectPath:
          type: string

    # ── Books ──────────────────────────────────────
    Book:
      type: object
      required: [id, title, authorId, authorName, fileObjectPath, fileFormat, isPublic, downloadCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        authorId:
          type: string
        authorName:
          type: string
        coverObjectPath:
          type: ["string", "null"]
        fileObjectPath:
          type: string
        fileFormat:
          type: string
          enum: [pdf, epub]
        isPublic:
          type: boolean
        downloadCount:
          type: integer
        commentCount:
          type: integer
        inLibrary:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BookListResponse:
      type: object
      required: [books, total]
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        total:
          type: integer

    CreateBookBody:
      type: object
      required: [title, fileObjectPath, fileFormat]
      properties:
        title:
          type: string
        description:
          type: string
        genre:
          type: string
        coverObjectPath:
          type: string
        fileObjectPath:
          type: string
        fileFormat:
          type: string
          enum: [pdf, epub]
        isPublic:
          type: boolean
          default: true

    UpdateBookBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        genre:
          type: string
        coverObjectPath:
          type: string
        isPublic:
          type: boolean

    DownloadResponse:
      type: object
      required: [fileUrl]
      properties:
        fileUrl:
          type: string

    # ── Library ────────────────────────────────────
    LibraryEntry:
      type: object
      required: [id, bookId, userId, savedAt, book]
      properties:
        id:
          type: integer
        bookId:
          type: integer
        userId:
          type: string
        savedAt:
          type: string
          format: date-time
        book:
          $ref: "#/components/schemas/Book"

    LibraryListResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LibraryEntry"

    # ── Comments ───────────────────────────────────
    Comment:
      type: object
      required: [id, bookId, authorId, authorName, content, createdAt]
      properties:
        id:
          type: integer
        bookId:
          type: integer
        authorId:
          type: string
        authorName:
          type: string
        authorAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    CommentListResponse:
      type: object
      required: [comments]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    CreateCommentBody:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ── Messages ───────────────────────────────────
    Message:
      type: object
      required: [id, senderId, receiverId, content, createdAt]
      properties:
        id:
          type: integer
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MessageListResponse:
      type: object
      required: [messages, otherUser]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        otherUser:
          $ref: "#/components/schemas/UserProfile"

    Conversation:
      type: object
      required: [otherUser, lastMessage, unreadCount]
      properties:
        otherUser:
          $ref: "#/components/schemas/UserProfile"
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer

    ConversationListResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"

    SendMessageBody:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ── Storage ────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
